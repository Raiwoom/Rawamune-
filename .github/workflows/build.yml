name: Android P2P Hardcore Compiler

# Скрипт срабатывает автоматически при сохранении файлов или при ручном запуске кнопкой
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем созданную вами структуру папок и кодов мессенджера
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      # 2. Разворачиваем стабильное окружение Java 17, необходимое для Gradle и Compose
      - name: Настройка Java 17 (Zulu JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Автоматически создаем исполняемый локальный Gradle Wrapper
      - name: Инициализация сборщика Gradle
        run: gradle wrapper --gradle-version 8.5

      # 4. Даем системе права на выполнение утилиты сборки пакетов
      - name: Разрешение прав доступа для gradlew
        run: chmod +x gradlew

      # 5. Запуск компиляции защищенного, обходящего блокировки APK-пакета
      - name: Компиляция Бессмертного APK Мессенджера
        run: ./gradlew assembleDebug --stacktrace

      # 6. Выгрузка готового скомпилированного файла в интерфейс GitHub
      - name: Загрузка готового APK на телефон
        uses: actions/upload-artifact@v4
        with:
          name: Rawanume
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          
