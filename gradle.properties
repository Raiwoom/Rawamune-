# Отключаем онлайн-верификацию зависимостей, чтобы сборщик не лез в интернет
org.gradle.dependency.verification=off

# Переводим компилятор в жесткий автономный режим (Offline Mode)
org.gradle.offline=true

# Выделяем 2 ГБ оперативной памяти для быстрой сборки тяжелых C++ библиотек WebRTC
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Активируем новый оптимизатор кода R8 для защиты APK от декомпиляции
android.enableR8=true

# Отключаем генерацию ненужных системных логов сборки для ускорения процесса
org.gradle.configureondemand=true
