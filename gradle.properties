# Выделяем ОЗУ для быстрой компиляции C++ компонентов WebRTC
org.gradle.jvmargs=-Xmx3048m -XX:MaxMetaspaceSize=512m

# Включаем современный оптимизатор кода R8 для жесткой защиты APK от декомпиляции
android.enableR8=true

# Активируем кэширование конфигурации для ускорения сборки на сервере
org.gradle.configureondemand=true

# Разрешаем поддержку AndroidX библиотек для Jetpack Compose графики
android.useAndroidX=true
